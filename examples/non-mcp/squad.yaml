# Non-MCP example: hook and watch adapters for agents without MCP support.
#
# - builder: Claude Code via MCP
# - codex:   OpenAI Codex CLI via hook script
# - gemini:  Gemini CLI via watched file
#
# Setup:
#   1. Copy this file to squad.yaml in your project directory
#   2. Edit .squad/hooks/codex.sh to call Codex and send results back
#   3. Run a file-watching loop for gemini (see docs/adapters.md)
#   4. squad start && squad watch

project: non-mcp-example

heartbeat_timeout_seconds: 30

recovery:
  on_agent_offline: reconnect
  reconnect_attempts: 3
  reconnect_interval_seconds: 5

agents:
  builder:
    adapter: mcp

  codex:
    adapter: hook
    hook_script: .squad/hooks/codex.sh

  gemini:
    adapter: watch
    watch_file: .squad/gemini-output.txt

workflow:
  mode: pipeline
  start_at: implement

  steps:
    - id: implement
      agent: builder
      action: implement
      message: |
        Goal: {goal}

        Implement the required changes. Call mark_done with a summary.

    - id: codex-review
      agent: codex
      action: review
      message: |
        Review the following implementation for correctness:

        {previous_output}

        Respond with PASS or FAIL and specific notes.

    - id: gemini-security
      agent: gemini
      action: security-scan
      message: |
        Perform a security review of the implementation:

        {previous_output}

        Look for vulnerabilities, unsafe patterns, or missing validation.
        Summarize your findings.
