# Pipeline example: three sequential agents — fetch, transform, report.
# Each step runs once in order; no looping.
#
# Setup:
#   1. Copy this file to squad.yaml in your project directory
#   2. Configure each agent in its respective MCP settings with its SQUAD_AGENT_ID
#   3. squad start && squad watch

project: pipeline-example

heartbeat_timeout_seconds: 30

recovery:
  on_agent_offline: reconnect
  reconnect_attempts: 3
  reconnect_interval_seconds: 5

agents:
  fetcher:
    adapter: mcp

  transformer:
    adapter: mcp

  reporter:
    adapter: mcp

workflow:
  mode: pipeline
  start_at: fetch

  steps:
    - id: fetch
      agent: fetcher
      action: fetch
      message: |
        Fetch the data required for: {goal}

        Retrieve all relevant information and call mark_done with a
        structured summary of what you found.

    - id: transform
      agent: transformer
      action: transform
      message: |
        Transform the following raw data for: {goal}

        Input:
        {previous_output}

        Clean, normalize, and structure the data. Call mark_done with
        the transformed result.

    - id: report
      agent: reporter
      action: report
      message: |
        Generate a final report for: {goal}

        Transformed data:
        {previous_output}

        Produce a clear, concise report and call mark_done with the
        report content.
